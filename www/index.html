<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="舌头跟练">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">
  <title>改善打鼾 · 舌头跟练</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --bg-card: #141420;
      --accent: #00e5a0;
      --accent-warm: #ff6b6b;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.55);
      --text-dim: rgba(255,255,255,0.3);
      --radius: 20px;
      --safe-bottom: env(safe-area-inset-bottom, 16px);
    }
    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
      touch-action: manipulation;
    }
    .app {
      max-width: 480px; margin: 0 auto; height: 100%;
      display: flex; flex-direction: column; position: relative;
    }
    @media (min-width: 768px) {
      .app { max-width: 520px; }
      .exercise__name { font-size: 28px; }
      .progress__wrap { width: 260px; height: 260px; }
      .progress__wrap svg { width: 260px; height: 260px; }
      .progress__time { font-size: 64px; }
      .welcome__title { font-size: 40px; }
      .countdown__num { font-size: 180px; }
    }
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px 28px calc(24px + var(--safe-bottom));
      opacity: 0; pointer-events: none; transition: opacity 0.35s ease;
    }
    .screen.active { opacity: 1; pointer-events: auto; }

    /* ===== WELCOME ===== */
    .welcome__logo { width: 80px; height: 80px; border-radius: 22px; background: linear-gradient(135deg, #1a1a2e, #0f3460); display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
    .welcome__logo svg { width: 44px; height: 44px; }
    .welcome__title { font-size: 32px; font-weight: 700; letter-spacing: 4px; margin-bottom: 6px; }
    .welcome__sub { font-size: 15px; color: var(--text-muted); margin-bottom: 10px; }
    .welcome__tagline { font-size: 13px; color: var(--text-dim); margin-bottom: 48px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      border: none; border-radius: 50px; font-size: 17px; font-weight: 600;
      padding: 16px 48px; cursor: pointer; transition: transform 0.15s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn--primary { background: var(--accent); color: #000; width: 100%; max-width: 300px; }
    .btn--ghost { background: rgba(255,255,255,0.08); color: var(--text); }
    .welcome__hint { font-size: 12px; color: var(--text-dim); margin-top: 20px; }

    /* ===== COUNTDOWN ===== */
    .countdown__num { font-size: 140px; font-weight: 800; line-height: 1; color: var(--accent); }
    .countdown__num.pulse { animation: pulse 0.33s ease-out; }
    @keyframes pulse { 0% { transform: scale(1.4); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
    .countdown__label { font-size: 18px; color: var(--text-muted); margin-top: 16px; }

    /* ===== EXERCISE ===== */
    .exercise__bg { position: absolute; inset: 0; z-index: 0; }
    .exercise__bg img { width: 100%; height: 100%; object-fit: cover; }
    .exercise__overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,10,15,0.55) 0%, rgba(10,10,15,0.35) 40%, rgba(10,10,15,0.7) 100%); z-index: 1; }
    .exercise__content { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 20px 0 28px; }
    .exercise__top { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0 8px; }
    .exercise__exit { width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.12); color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .exercise__name { font-size: 22px; font-weight: 700; }
    .exercise__dots { display: flex; gap: 6px; }
    .exercise__dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: background 0.3s; }
    .exercise__dot.active { background: var(--accent); }
    .exercise__dot.done { background: var(--accent); opacity: 0.5; }

    /* progress ring */
    .progress__wrap { position: relative; width: 200px; height: 200px; }
    .progress__ring { transform: rotate(-90deg); }
    .progress__bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
    .progress__fill { fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.25s linear; }
    .progress__time { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 52px; font-weight: 700; letter-spacing: 2px; font-variant-numeric: tabular-nums; font-family: "SF Mono", "Menlo", "Consolas", monospace; }

    .exercise__instruction { font-size: 16px; color: var(--text-muted); text-align: center; min-height: 24px; }
    .exercise__bottom { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; }
    .exercise__btn { width: 48px; height: 48px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ===== REST ===== */
    .rest__icon { font-size: 48px; margin-bottom: 20px; }
    .rest__title { font-size: 28px; font-weight: 700; margin-bottom: 28px; }
    .rest__timer { font-size: 64px; font-weight: 700; color: var(--accent); }
    .rest__next { font-size: 14px; color: var(--text-dim); margin-top: 24px; }

    /* ===== PAUSE ===== */
    .pause__overlay { position: absolute; inset: 0; z-index: 10; background: rgba(10,10,15,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .pause__overlay.active { opacity: 1; pointer-events: auto; }
    .pause__title { font-size: 26px; font-weight: 700; }
    .pause__btns { display: flex; gap: 16px; }

    /* ===== COMPLETE ===== */
    .complete__icon { font-size: 64px; margin-bottom: 16px; }
    .complete__title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .complete__stats { font-size: 14px; color: var(--text-muted); margin-bottom: 36px; text-align: center; line-height: 1.8; }
    .complete__btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 260px; }

    /* ===== LANDSCAPE WARNING ===== */
    .landscape__warn { display: none; position: absolute; inset: 0; z-index: 100; background: var(--bg); flex-direction: column; align-items: center; justify-content: center; gap: 16px; font-size: 16px; color: var(--text-muted); }
    @media (orientation: landscape) and (max-height: 500px) { .landscape__warn { display: flex; } }

    /* ===== MISC ===== */
    .hidden { display: none !important; }
    @media (min-width: 481px) {
      .app { border-left: 1px solid rgba(255,255,255,0.06); border-right: 1px solid rgba(255,255,255,0.06); }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- landscape warning -->
    <div class="landscape__warn">请竖屏使用<br><span style="font-size:32px">📱</span></div>

    <!-- WELCOME -->
    <section class="screen active" id="screen-welcome">
      <div class="welcome__logo"><svg viewBox="0 0 512 512" width="44" height="44"><path d="M156 300 Q156 240 256 240 Q356 240 356 300 Q356 360 256 360 Q156 360 156 300Z" fill="none" stroke="#00e5a0" stroke-width="16" stroke-linecap="round"/><path d="M220 250 Q256 180 292 250" fill="none" stroke="#00e5a0" stroke-width="12" stroke-linecap="round"/><circle cx="256" cy="180" r="8" fill="#00e5a0"/></svg></div>
      <div class="welcome__title">改善打鼾</div>
      <div class="welcome__sub">舌头跟练 · 4个动作</div>
      <div class="welcome__tagline">每天坚持五分钟，科学改善打鼾</div>
      <button class="btn btn--primary" id="btn-start">开始训练</button>
      <div class="welcome__hint">🎧 戴上耳机效果更佳</div>
    </section>

    <!-- COUNTDOWN -->
    <section class="screen" id="screen-countdown">
      <div class="countdown__num" id="countdown-num">3</div>
      <div class="countdown__label" id="countdown-label">准备</div>
    </section>

    <!-- EXERCISE -->
    <section class="screen" id="screen-exercise">
      <div class="exercise__bg"><img id="exercise-img" src="" alt=""></div>
      <div class="exercise__overlay"></div>
      <div class="exercise__content">
        <div class="exercise__top">
          <button class="exercise__exit" id="btn-exit">✕</button>
          <div class="exercise__name" id="exercise-name"></div>
          <div class="exercise__dots" id="exercise-dots"></div>
        </div>
        <div class="progress__wrap">
          <svg class="progress__ring" viewBox="0 0 200 200" width="200" height="200">
            <circle class="progress__bg" cx="100" cy="100" r="88"/>
            <circle class="progress__fill" id="progress-fill" cx="100" cy="100" r="88" stroke-dasharray="552.92" stroke-dashoffset="0"/>
          </svg>
          <div class="progress__time" id="progress-time">01:00</div>
        </div>
        <div class="exercise__instruction" id="exercise-instruction"></div>
        <div class="exercise__bottom">
          <button class="exercise__btn" id="btn-pause">⏸</button>
        </div>
      </div>
      <!-- Pause overlay -->
      <div class="pause__overlay" id="pause-overlay">
        <div class="pause__title">已暂停</div>
        <div class="pause__btns">
          <button class="btn btn--primary" id="btn-resume">▶ 继续</button>
          <button class="btn btn--ghost" id="btn-quit">退出</button>
        </div>
      </div>
    </section>

    <!-- REST -->
    <section class="screen" id="screen-rest">
      <div class="rest__icon">😌</div>
      <div class="rest__title">休息一下</div>
      <div class="rest__timer" id="rest-timer">10</div>
      <div class="rest__next" id="rest-next"></div>
    </section>

    <!-- COMPLETE -->
    <section class="screen" id="screen-complete">
      <div class="complete__icon">🎉</div>
      <div class="complete__title">训练完成!</div>
      <div class="complete__stats" id="complete-stats"></div>
      <div class="complete__btns">
        <button class="btn btn--primary" id="btn-again">再练一次</button>
        <button class="btn btn--ghost" id="btn-close">关闭</button>
      </div>
    </section>
  </div>

  <script>
  (function() {
    // ─── EXERCISE DATA ───────────────────────────────
    const EXERCISES = [
      { id: 'lift-palate', name: '挺软腭', subtitle: 'Lift Soft Palate', photo: 'images/exercise-01.jpg', duration: 60, restAfter: 10,
        cues: [
          { at: 0,  text: '保持嘴巴张开，向上抬起软腭' },
          { at: 10, text: '保持力度，坚持住' },
          { at: 30, text: '还有30秒' },
          { at: 50, text: '最后10秒' },
        ] },
      { id: 'tongue-palate', name: '舌顶上颚', subtitle: 'Tongue Press Palate', photo: 'images/exercise-02.jpg', duration: 60, restAfter: 10,
        cues: [
          { at: 0,  text: '舌尖顶住上颚，保持力度' },
          { at: 10, text: '感受舌尖的压力' },
          { at: 30, text: '还有30秒' },
          { at: 50, text: '最后10秒' },
        ] },
      { id: 'tongue-stretch', name: '舌头拉伸', subtitle: 'Tongue Stretch', photo: 'images/exercise-03.jpg', duration: 60, restAfter: 10,
        cues: [
          { at: 0,  text: '舌头尽量向外伸，感受拉伸' },
          { at: 10, text: '再用力伸远一点' },
          { at: 30, text: '还有30秒' },
          { at: 50, text: '最后10秒' },
        ] },
      { id: 'tongue-resist', name: '舌头抗阻', subtitle: 'Tongue Resistance', photo: 'images/exercise-04.jpg', duration: 60, restAfter: 10,
        cues: [
          { at: 0,  text: '用手抵住舌头，用力对抗' },
          { at: 10, text: '加大对抗力度' },
          { at: 30, text: '还有30秒' },
          { at: 50, text: '最后10秒' },
        ] },
    ];

    // ─── DOM REFS ────────────────────────────────────
    const $ = s => document.querySelector(s);
    const screenWelcome   = $('#screen-welcome');
    const screenCountdown = $('#screen-countdown');
    const screenExercise  = $('#screen-exercise');
    const screenRest      = $('#screen-rest');
    const screenComplete  = $('#screen-complete');
    const pauseOverlay    = $('#pause-overlay');

    const countdownNum    = $('#countdown-num');
    const countdownLabel  = $('#countdown-label');
    const exerciseImg     = $('#exercise-img');
    const exerciseName    = $('#exercise-name');
    const exerciseDots    = $('#exercise-dots');
    const exerciseInst    = $('#exercise-instruction');
    const progressFill    = $('#progress-fill');
    const progressTime    = $('#progress-time');
    const restTimer       = $('#rest-timer');
    const restNext        = $('#rest-next');
    const completeStats   = $('#complete-stats');

    const circumference = 552.92; // 2 * PI * 88

    // Preload next image
    const preloader = new Image();

    // ─── SCREEN MANAGER ──────────────────────────────
    let currentScreen = 'welcome';
    function showScreen(name) {
      [screenWelcome, screenCountdown, screenExercise, screenRest, screenComplete].forEach(s => s.classList.remove('active'));
      if (name === 'welcome') screenWelcome.classList.add('active');
      else if (name === 'countdown') screenCountdown.classList.add('active');
      else if (name === 'exercise') screenExercise.classList.add('active');
      else if (name === 'rest') screenRest.classList.add('active');
      else if (name === 'complete') screenComplete.classList.add('active');
      currentScreen = name;
    }

    // ─── AUDIO: Metronome ────────────────────────────
    let audioCtx = null;
    let masterGain = null;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.6;
      masterGain.connect(audioCtx.destination);
    }

    let beatTimer = null;
    let beatCount = 0;

    function playTick(time, freq, dur, vol) {
      if (!audioCtx || !masterGain) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
      osc.connect(gain).connect(masterGain);
      osc.start(time);
      osc.stop(time + dur);
    }

    function scheduleBeat(isDownbeat) {
      if (!audioCtx || !masterGain) return;
      const now = audioCtx.currentTime;
      if (isDownbeat) {
        playTick(now, 150, 0.08, 0.7);
        playTick(now, 800, 0.05, 0.5);
      } else {
        playTick(now, 800, 0.04, 0.35);
      }
    }

    function startBeats(bpm, mode) {
      stopBeats();
      beatCount = 0;
      const interval = (60 / bpm) * 1000;
      const beatsPerBar = (mode === 'rest') ? 2 : 4;
      scheduleBeat(true); // first beat immediately
      beatTimer = setInterval(() => {
        beatCount++;
        const isDownbeat = (beatCount % beatsPerBar === 0);
        scheduleBeat(isDownbeat);
      }, interval);
    }

    function stopBeats() {
      if (beatTimer) { clearInterval(beatTimer); beatTimer = null; }
      beatCount = 0;
    }

    // ─── AUDIO: TTS ──────────────────────────────────
    let ttsAvailable = false;
    let lastSpokeText = '';

    function initTTS() {
      if (!('speechSynthesis' in window)) return;
      const voices = speechSynthesis.getVoices();
      if (voices.length === 0) {
        speechSynthesis.onvoiceschanged = () => { ttsAvailable = true; };
      } else {
        ttsAvailable = true;
      }
      // Warm up: silent utterance
      const u = new SpeechSynthesisUtterance('');
      u.volume = 0;
      speechSynthesis.speak(u);
    }

    function speak(text, priority) {
      if (!ttsAvailable || text === lastSpokeText) return;
      lastSpokeText = text;
      try {
        if (priority === 'high') speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN';
        u.rate = 0.85;
        u.pitch = 1.0;
        u.volume = 1.0;
        const voices = speechSynthesis.getVoices();
        const zh = voices.find(v => v.lang.startsWith('zh-CN'));
        if (zh) u.voice = zh;
        speechSynthesis.speak(u);
      } catch(e) {
        ttsAvailable = false;
      }
    }

    function cancelSpeech() { if (ttsAvailable) speechSynthesis.cancel(); }

    // ─── WORKOUT ENGINE ──────────────────────────────
    let exerciseIdx = 0;
    let phase = '';        // intro | countdown | active | rest | cooldown | complete
    let phaseMs = 0;
    let phaseTotalMs = 0;
    let workoutTimer = null;
    let paused = false;
    let lastTickTime = 0;
    let wakeLock = null;

    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => { wakeLock = null; });
        }
      } catch(e) { /* not supported */ }
    }

    function releaseWakeLock() {
      if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
    }

    function updateProgressRing() {
      if (phaseTotalMs === 0) { progressFill.style.strokeDashoffset = '0'; return; }
      const pct = Math.max(0, phaseMs / phaseTotalMs);
      progressFill.style.strokeDashoffset = circumference * (1 - pct);
    }

    function formatTime(ms) {
      const totalSec = Math.ceil(ms / 1000);
      const min = Math.floor(totalSec / 60);
      const sec = totalSec % 60;
      return String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
    }

    function updateDots(idx) {
      let html = '';
      for (let i = 0; i < EXERCISES.length; i++) {
        let cls = '';
        if (i < idx) cls = 'done';
        else if (i === idx) cls = 'active';
        html += `<div class="exercise__dot ${cls}"></div>`;
      }
      exerciseDots.innerHTML = html;
    }

    function setExercisePhoto(idx) {
      const ex = EXERCISES[idx];
      exerciseImg.src = ex.photo;
      exerciseName.textContent = ex.name;
      exerciseInst.textContent = ex.cues[0] ? ex.cues[0].text : '';
      updateDots(idx);
      // Preload next
      if (idx + 1 < EXERCISES.length) preloader.src = EXERCISES[idx + 1].photo;
    }

    function enterPhase(newPhase) {
      phase = newPhase;
      const ex = EXERCISES[exerciseIdx];

      if (phase === 'intro') {
        phaseTotalMs = 3000;
        phaseMs = phaseTotalMs;
        showScreen('countdown');
        countdownNum.textContent = '';
        countdownLabel.textContent = '准备';
        speak('准备开始', 'high');
      }
      else if (phase === 'countdown') {
        phaseTotalMs = 3000;
        phaseMs = phaseTotalMs;
        showScreen('countdown');
      }
      else if (phase === 'active') {
        phaseTotalMs = ex.duration * 1000;
        phaseMs = phaseTotalMs;
        setExercisePhoto(exerciseIdx);
        showScreen('exercise');
        progressFill.style.strokeDashoffset = '0';
        progressTime.textContent = formatTime(phaseMs);
        startBeats(100, 'exercise');
        speak(ex.name + '，开始', 'high');
        // Speak first cue after a short delay
        setTimeout(() => {
          if (phase === 'active' && !paused) {
            speak(ex.cues[0].text, 'normal');
          }
        }, 1500);
      }
      else if (phase === 'rest') {
        phaseTotalMs = (ex.restAfter || 10) * 1000;
        phaseMs = phaseTotalMs;
        showScreen('rest');
        restTimer.textContent = Math.ceil(phaseMs / 1000);
        const nextName = (exerciseIdx + 1 < EXERCISES.length) ? EXERCISES[exerciseIdx + 1].name : '';
        restNext.textContent = nextName ? '下一个：' + nextName : '';
        startBeats(60, 'rest');
        speak('休息一下', 'high');
      }
      else if (phase === 'cooldown') {
        phaseTotalMs = 5000;
        phaseMs = phaseTotalMs;
        showScreen('exercise');
        progressFill.style.strokeDashoffset = '0';
        progressTime.textContent = formatTime(phaseMs);
        exerciseInst.textContent = '很好！训练完成！';
        stopBeats();
        speak('很好！训练完成', 'high');
      }
      else if (phase === 'complete') {
        phaseTotalMs = 0;
        phaseMs = 0;
        stopBeats();
        cancelSpeech();
        releaseWakeLock();
        showScreen('complete');
        completeStats.innerHTML = '今日完成 <b>4</b> 个动作<br>总用时 <b>约5分钟</b>';
      }
    }

    function tick() {
      if (paused) { lastTickTime = Date.now(); return; }
      const now = Date.now();
      const delta = lastTickTime ? now - lastTickTime : 100;
      lastTickTime = now;
      phaseMs -= delta;
      if (phaseMs <= 0) { phaseMs = 0; advanceWorkout(); return; }

      // Update visuals for current phase
      if (phase === 'countdown' || phase === 'intro') {
        const num = Math.ceil(phaseMs / 1000);
        countdownNum.textContent = num;
        countdownNum.classList.remove('pulse');
        void countdownNum.offsetWidth;
        countdownNum.classList.add('pulse');
        if (phase === 'countdown' && num <= 3 && num >= 1) {
          speak(String(num), 'high');
          scheduleBeat(true);
        }
        if (phase === 'intro') {
          countdownLabel.textContent = '准备';
        } else {
          countdownLabel.textContent = num === 1 ? '' : '';
        }
      }
      else if (phase === 'active' || phase === 'cooldown') {
        progressTime.textContent = formatTime(phaseMs);
        updateProgressRing();

        // Voice cues
        if (phase === 'active') {
          const ex = EXERCISES[exerciseIdx];
          const elapsedS = Math.floor((ex.duration * 1000 - phaseMs) / 1000);
          for (const cue of ex.cues) {
            if (cue.at === elapsedS && cue.at > 0) {
              speak(cue.text, 'normal');
            }
          }
        }
      }
      else if (phase === 'rest') {
        restTimer.textContent = Math.ceil(phaseMs / 1000);
      }
    }

    function advanceWorkout() {
      if (phase === 'intro') {
        enterPhase('countdown');
      }
      else if (phase === 'countdown') {
        if (exerciseIdx < EXERCISES.length) {
          enterPhase('active');
        }
      }
      else if (phase === 'active') {
        // Check if rest needed
        const ex = EXERCISES[exerciseIdx];
        if (ex.restAfter > 0 && exerciseIdx < EXERCISES.length - 1) {
          exerciseIdx++;
          enterPhase('rest');
        } else if (exerciseIdx < EXERCISES.length - 1) {
          exerciseIdx++;
          enterPhase('countdown');
        } else {
          enterPhase('cooldown');
        }
      }
      else if (phase === 'rest') {
        enterPhase('countdown');
      }
      else if (phase === 'cooldown') {
        enterPhase('complete');
      }
    }

    function startWorkout() {
      exerciseIdx = 0;
      paused = false;
      lastTickTime = Date.now();
      initAudio();
      initTTS();
      requestWakeLock();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      enterPhase('intro');
      workoutTimer = setInterval(tick, 100);
    }

    function pauseWorkout() {
      paused = true;
      stopBeats();
      cancelSpeech();
      releaseWakeLock();
      pauseOverlay.classList.add('active');
    }

    function resumeWorkout() {
      paused = false;
      lastTickTime = Date.now();
      pauseOverlay.classList.remove('active');
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      requestWakeLock();
      lastSpokeText = '';
      // Restart beats appropriate for phase
      if (phase === 'active') startBeats(100, 'exercise');
      else if (phase === 'rest') startBeats(60, 'rest');
    }

    function quitWorkout() {
      if (workoutTimer) { clearInterval(workoutTimer); workoutTimer = null; }
      stopBeats();
      cancelSpeech();
      releaseWakeLock();
      paused = false;
      pauseOverlay.classList.remove('active');
      exerciseIdx = 0;
      showScreen('welcome');
    }

    function resetWorkout() {
      if (workoutTimer) { clearInterval(workoutTimer); workoutTimer = null; }
      stopBeats();
      cancelSpeech();
      releaseWakeLock();
      paused = false;
      pauseOverlay.classList.remove('active');
      exerciseIdx = 0;
      showScreen('welcome');
    }

    // ─── EVENT LISTENERS ─────────────────────────────
    $('#btn-start').addEventListener('click', startWorkout);
    $('#btn-pause').addEventListener('click', pauseWorkout);
    $('#btn-resume').addEventListener('click', resumeWorkout);
    $('#btn-quit').addEventListener('click', quitWorkout);
    $('#btn-exit').addEventListener('click', () => {
      if (phase === 'active' || phase === 'rest') pauseWorkout();
      else quitWorkout();
    });
    $('#btn-again').addEventListener('click', resetWorkout);
    $('#btn-close').addEventListener('click', () => { showScreen('welcome'); });

    // Keyboard shortcut for testing
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && currentScreen === 'exercise') {
        e.preventDefault();
        if (paused) resumeWorkout(); else pauseWorkout();
      }
    });

    // ─── BACKGROUND TIME CORRECTION ──────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        // Tab hidden — timer keeps running via setInterval (throttled)
      } else {
        // Tab visible again — no correction needed since setInterval is authoritative
      }
    });

    // ─── PWA REGISTRATION ─────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Preload voices
    if ('speechSynthesis' in window) speechSynthesis.getVoices();

    console.log('🏋️ 舌头跟练 ready');
  })();
  </script>
</body>
</html>
